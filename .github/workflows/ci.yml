name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  kernel-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax compile kernel in Docker Compose
        run: docker compose run --rm kernel-test python -m compileall kernel

      - name: Run BVT tests in Docker Compose
        run: docker compose run --rm kernel-test sh -c "mkdir -p test-results && pytest -v tests -m bvt --junitxml=test-results/unit-pytest.xml"

      - name: Publish unit test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: test-results/unit-pytest.xml
          fail_on_failure: true
          detailed_summary: true

      - name: Upload unit test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kernel-test-report
          path: test-results/unit-pytest.xml

  webui-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-webui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: agent-webui/package-lock.json

      - name: Install dependencies
        run: npm ci --include=dev --no-audit --no-fund

      - name: Build
        run: npm run build
